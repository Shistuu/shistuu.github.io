<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MERGE MANIA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2 class="title"><span class=c1>MERGE</span> MANIA</h2>
    <div id="timer" style="display: none;">00:00</div>
    <div id="warning-message"></div>
    <div class="level-container">
      <div class="level">
        <p> CHOOSE YOUR SKILL</p>
        <button class="level-button" data-level="1">Amateur</button>
        <button class="level-button" data-level="2">Advanced</button>
        <button class="level-button" data-level="3">Elite</button>
      </div>
    </div>

    <div id="score-container" style="display: none;">
      <div class="cscore-text">Current Score: <span id="current-score">0</span></div>
      <div class="hscore-text">High Score: <span id="high-score">0</span></div>
    </div>
    <div id="container" style="display: none;"></div>

    <div id="game-over-modal" class="modal">
      <div class="modal-content">
        <h3>OOPS! You lose.</h3>
        <button id="play-again-btn">REPLAY<span>&#8619;</span></button>
      </div>
    </div>

    <script src="script.js" type="module"></script>
  </body>
</html>
