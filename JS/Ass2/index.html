<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <title>Tea Carousel</title>
</head>

<body>
  <div class="carousel-container">
    <div class="carousel">
      <img src="tea1.jpg" alt="Tea 1">
      <img src="tea2.jpg" alt="Tea 2">
      <img src="tea3.jpg" alt="Tea 3">
      <img src="tea4.jpg" alt="Tea 4">
      <img src="tea5.jpg" alt="Tea 5">
    </div>
    <div class="navigation">
      <button class="prev-btn"><i class="fa-solid fa-circle-chevron-left fa-2xl" style="color:#ee7e15;"></i></button>
      <div class="circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>
      <button class="next-btn"><i class="fa-solid fa-circle-chevron-right fa-2xl" style="color: #ee7e15;"></i></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
